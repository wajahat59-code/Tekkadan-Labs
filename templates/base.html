<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>{{ title if title else "Tekkadan Labs" }}</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <script src="https://www.amcharts.com/lib/4/core.js"></script>
    <script src="https://www.amcharts.com/lib/4/maps.js"></script>
    <script src="https://www.amcharts.com/lib/4/geodata/worldLow.js"></script>
    <script src="https://www.amcharts.com/lib/4/themes/dark.js"></script>
    <script src="https://www.amcharts.com/lib/4/themes/animated.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/logo.jpg') }}"
    />
    <link
      rel="apple-touch-icon"
      href="{{ url_for('static', filename='images/logo.jpg') }}"
    />
  </head>
  <body>
    <div id="bg-anim"></div>
    <!-- animated background layer -->

    <header class="site-header">
      <div class="brand">
        <a href="/" class="logo">
          <div class="logo-animation">
            <svg
              class="logo-icon"
              viewBox="0 0 100 100"
              xmlns="http://www.w3.org/2000/svg"
            >
              <circle
                class="nucleus"
                cx="50"
                cy="50"
                r="8"
                fill="var(--neon)"
              />
              <ellipse
                class="orbit-ring orbit-1"
                cx="50"
                cy="50"
                rx="35"
                ry="15"
                fill="none"
                stroke="var(--neon)"
                stroke-width="2"
              />
              <ellipse
                class="orbit-ring orbit-2"
                cx="50"
                cy="50"
                rx="35"
                ry="15"
                fill="none"
                stroke="var(--neon-2)"
                stroke-width="2"
              />
              <ellipse
                class="orbit-ring orbit-3"
                cx="50"
                cy="50"
                rx="35"
                ry="15"
                fill="none"
                stroke="var(--accent)"
                stroke-width="2"
              />
              <circle class="electron-dot e1" r="4" fill="var(--accent)" />
              <circle class="electron-dot e2" r="4" fill="var(--neon)" />
              <circle class="electron-dot e3" r="4" fill="var(--neon-2)" />
            </svg>
          </div>
          <span class="brand-text">Tekkadan Labs</span>
        </a>
      </div>

      <!-- BURGER BUTTON -->
      <div class="burger" id="burger">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <!-- NAVIGATION -->
      <nav class="main-nav" id="nav-menu">
      <a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('about') }}">About</a>
<a href="{{ url_for('contact') }}">Contact</a>
<a href="{{ url_for('signup') }}">Sign Up</a>
      </nav>
    </header>

    <main>{% block content %}{% endblock %}</main>

    <footer class="site-footer">
      <div>© {{ now.year if now else "2025" }} Tekkadan Labs</div>

      <div class="social-links">
        <a
          href="https://www.instagram.com/yuozhe"
          target="_blank"
          aria-label="Instagram"
          class="social-icon"
        >
          <!-- Instagram SVG -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M7.5 3h9a4.5 4.5 0 0 1 4.5 4.5v9a4.5 4.5 0 0 1-4.5 4.5h-9A4.5 4.5 0 0 1 3 16.5v-9A4.5 4.5 0 0 1 7.5 3z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M16.5 7.5h.008v.008H16.5V7.5zM12 9a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"
            />
          </svg>
        </a>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
